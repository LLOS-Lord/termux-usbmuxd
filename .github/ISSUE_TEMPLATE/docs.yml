
name: Documentation
description: Report missing, incorrect or confusing documentation.
title: "[Docs]: "
labels:
  - documentation

body:
  - type: textarea
    id: problem
    attributes:
      label: What is wrong with the documentation?
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: File or section
      placeholder: README.md / Installation

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
